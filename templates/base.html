<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌍 Country Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e0e0e0;
    }
    nav {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 14px 30px;
      display: flex;
      align-items: center;
      gap: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    nav .brand { font-size: 1.4rem; font-weight: 700; color: #e94560; text-decoration: none; }
    nav a { color: #a0c4ff; text-decoration: none; font-size: 0.95rem; transition: color .2s; }
    nav a:hover { color: #fff; }
    .container { max-width: 820px; margin: 40px auto; padding: 0 20px; }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 36px;
      backdrop-filter: blur(6px);
    }
    h1 { font-size: 2rem; color: #fff; margin-bottom: 8px; }
    h2 { font-size: 1.4rem; color: #a0c4ff; margin-bottom: 20px; }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform .15s, opacity .15s;
    }
    .btn:hover { transform: translateY(-2px); opacity: .9; }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-secondary { background: rgba(255,255,255,0.12); color: #fff; }
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1rem;
      margin-bottom: 16px;
      outline: none;
    }
    input[type="text"]:focus { border-color: #a0c4ff; }
    /*{% block extra_style %}{% endblock %}*/

  </style>
</head>
<body>
  <nav>
    <a class="brand" href="/">🌍 CountryQuiz</a>
    <a href="/">Home</a>
    <a href="/leaderboard">Leaderboard</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
